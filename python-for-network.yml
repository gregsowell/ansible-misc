---
- name: Quick demo showing running python scripts against network devices
  hosts: nexus9k3
  gather_facts: no
  tasks:
    - name: Run a python script to show the hostname of a device
      # ansible.builtin.shell: "python python-for-network.py --host {{ ansible_host }} --username {{ ansible_user }} --password {{ ansible_password }}"
      ansible.builtin.shell: "/usr/bin/python3.11 python-for-network.py --host {{ ansible_host }} --username {{ ansible_user }} --password {{ ansible_password }}"
      register: hostname_output
      delegate_to: localhost
      no_log: true
      changed_when: false

    # - name: Display the hostname output
    #   ansible.builtin.debug:
    #     var: hostname_output.stdout

    - name: Display the hostname output if the description isn't null
      when: item.description is not none
      ansible.builtin.debug:
        msg: "interface {{ item.interface }} has description {{ item.description }}"
      loop: "{{ hostname_output.stdout | from_json }}"