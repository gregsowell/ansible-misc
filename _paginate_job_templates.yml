---
- name: Fetch next page of job templates
  ansible.builtin.uri:
    url: "{{ next_url if next_url.startswith('http') else controller_host ~ next_url }}"
    method: GET
    url_username: "{{ controller_username }}"
    url_password: "{{ controller_password }}"
    force_basic_auth: true
    return_content: true
    validate_certs: "{{ validate_certs }}"
    status_code: 200
    headers:
      Accept: "application/json"
  register: page
  changed_when: false

- name: Accumulate results and advance pagination
  ansible.builtin.set_fact:
    all_templates: "{{ all_templates + (page.json.results | default([])) }}"
    next_url: "{{ page.json.next if (page.json.next is not none) else none }}"

- name: Keep paging while there is a next URL
  ansible.builtin.include_tasks: _paginate_job_templates.yml
  when: next_url is not none
